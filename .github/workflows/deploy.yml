name: deploy-pages

# Builds the EN (default, /) and RU (/ru/) Material sites into one tree and
# publishes it to GitHub Pages via the Actions artifact path (Pages source must
# be set to "GitHub Actions" once, under Settings -> Pages).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"                       # enables social-card rendering (plugins.social.cards)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0               # blog plugin derives dates from git history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
      - run: pip install -r requirements.txt
      - run: mkdocs build -f mkdocs.en.yml      # -> ./site        (served at /)
      - run: mkdocs build -f mkdocs.ru.yml      # -> ./site/ru     (served at /ru/)
      - name: reject symlinks (upload-pages-artifact requirement)
        run: 'test -z "$(find site -type l)"'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
